<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>liked_loud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #d4d4d4; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    .status-box {
      margin-top: 24px;
      padding: 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      font-size: 0.88rem;
      display: none;
    }

    .status-box.visible { display: block; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.queued, .dot.in-progress { background: #facc15; animation: pulse 1.2s infinite; }
    .dot.done { background: #4ade80; }
    .dot.error { background: #f87171; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-label { font-weight: 600; text-transform: capitalize; }

    .job-id {
      color: #555;
      font-size: 0.78rem;
      word-break: break-all;
    }

    .result-link {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2a2a;
    }

    .result-link a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
    }

    .result-link a:hover { text-decoration: underline; }

    .error-msg {
      margin-top: 10px;
      color: #f87171;
      word-break: break-all;
    }

    .steps {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 0.82rem;
    }

    .step.active { color: #f0f0f0; }
    .step.done-step { color: #4ade80; }

    .step-icon { font-size: 0.8rem; width: 14px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>liked_loud</h1>
    <p class="subtitle">Paste a reel link — we'll overlay the top comments and repost it.</p>

    <label for="url">Instagram Reel URL</label>
    <input id="url" type="text" placeholder="https://www.instagram.com/reel/..." />
    <button id="btn" onclick="startJob()">Process Reel</button>

    <div class="status-box" id="status-box">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span class="status-label" id="status-label">queued</span>
      </div>
      <div class="job-id" id="job-id"></div>
      <div class="steps" id="steps"></div>
      <div class="result-link" id="result-link" style="display:none">
        Posted: <a id="result-url" href="#" target="_blank"></a>
      </div>
      <div class="error-msg" id="error-msg" style="display:none"></div>
    </div>
  </div>

  <script>
    const STEPS = [
      { key: "downloading",       label: "Downloading reel" },
      { key: "fetching_comments", label: "Fetching comments" },
      { key: "rendering",         label: "Rendering video" },
      { key: "posting",           label: "Posting to Instagram" },
      { key: "done",              label: "Done" },
    ];

    let pollTimer = null;

    async function startJob() {
      const url = document.getElementById("url").value.trim();
      if (!url) return;

      document.getElementById("btn").disabled = true;
      document.getElementById("status-box").classList.add("visible");
      document.getElementById("result-link").style.display = "none";
      document.getElementById("error-msg").style.display = "none";
      setStatus("queued");

      const res = await fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });

      if (!res.ok) {
        setStatus("error");
        showError("Failed to start job.");
        document.getElementById("btn").disabled = false;
        return;
      }

      const { job_id } = await res.json();
      document.getElementById("job-id").textContent = "Job: " + job_id;
      pollTimer = setInterval(() => pollStatus(job_id), 3000);
    }

    async function pollStatus(job_id) {
      const res = await fetch("/status/" + job_id);
      if (!res.ok) return;
      const data = await res.json();

      setStatus(data.status);

      if (data.status === "done") {
        clearInterval(pollTimer);
        document.getElementById("btn").disabled = false;
        if (data.result) {
          const el = document.getElementById("result-link");
          const a = document.getElementById("result-url");
          a.href = data.result;
          a.textContent = data.result;
          el.style.display = "block";
        }
      } else if (data.status === "error") {
        clearInterval(pollTimer);
        document.getElementById("btn").disabled = false;
        showError(data.error || "Unknown error");
      }
    }

    function setStatus(status) {
      const dot = document.getElementById("dot");
      const label = document.getElementById("status-label");

      label.textContent = status.replace("_", " ");
      dot.className = "dot";

      if (status === "done") dot.classList.add("done");
      else if (status === "error") dot.classList.add("error");
      else dot.classList.add("in-progress");

      renderSteps(status);
    }

    function renderSteps(currentStatus) {
      const container = document.getElementById("steps");
      const currentIdx = STEPS.findIndex(s => s.key === currentStatus);
      container.innerHTML = STEPS.map((step, i) => {
        let cls = "step";
        let icon = "○";
        if (i < currentIdx || currentStatus === "done") { cls += " done-step"; icon = "✓"; }
        else if (i === currentIdx) { cls += " active"; icon = "→"; }
        return `<div class="${cls}"><span class="step-icon">${icon}</span>${step.label}</div>`;
      }).join("");
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = "Error: " + msg;
      el.style.display = "block";
    }
  </script>
</body>
</html>
