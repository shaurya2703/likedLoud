<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>liked_loud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      margin-top: 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      color: #666;
      border: none;
      border-radius: 0;
      margin: 0;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn:hover { background: #1a1a1a; color: #aaa; }

    .mode-btn.active {
      background: #2a2a2a;
      color: #f0f0f0;
      font-weight: 600;
    }

    .mode-btn:disabled { cursor: not-allowed; opacity: 0.4; }

    .mode-hint {
      font-size: 0.78rem;
      color: #555;
      margin-top: 8px;
      min-height: 16px;
    }

    /* Submit button */
    .submit-btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #d4d4d4; }
    .submit-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Status box */
    .status-box {
      margin-top: 24px;
      padding: 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      font-size: 0.88rem;
      display: none;
    }

    .status-box.visible { display: block; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.in-progress { background: #facc15; animation: pulse 1.2s infinite; }
    .dot.done { background: #4ade80; }
    .dot.error { background: #f87171; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-label { font-weight: 600; text-transform: capitalize; }

    .job-id {
      color: #555;
      font-size: 0.78rem;
      word-break: break-all;
      margin-bottom: 4px;
    }

    .steps {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 0.82rem;
    }

    .step.active { color: #f0f0f0; }
    .step.done-step { color: #4ade80; }
    .step-icon { font-size: 0.8rem; width: 14px; text-align: center; }

    /* Result area */
    .result-area {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #2a2a2a;
      display: none;
    }

    .result-area a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
    }

    .result-area a:hover { text-decoration: underline; }

    .preview-video {
      margin-top: 10px;
      width: 100%;
      border-radius: 8px;
      background: #000;
    }

    .error-msg {
      margin-top: 10px;
      color: #f87171;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>liked_loud</h1>
    <p class="subtitle">Paste a reel link — we'll overlay the top comments and repost it.</p>

    <label for="url">Instagram Reel URL</label>
    <input id="url" type="text" placeholder="https://www.instagram.com/reel/..." />

    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-preview" onclick="setMode('preview')">Preview only</button>
      <button class="mode-btn" id="btn-upload" onclick="setMode('upload')">Preview + Upload</button>
    </div>
    <p class="mode-hint" id="mode-hint">Renders the video so you can watch it — no posting.</p>

    <button class="submit-btn" id="btn" onclick="startJob()">Process Reel</button>

    <div class="status-box" id="status-box">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span class="status-label" id="status-label">queued</span>
      </div>
      <div class="job-id" id="job-id"></div>
      <div class="steps" id="steps"></div>
      <div class="result-area" id="result-area"></div>
      <div class="error-msg" id="error-msg" style="display:none"></div>
    </div>
  </div>

  <script>
    let mode = "preview"; // "preview" | "upload"

    const STEPS_UPLOAD  = [
      { key: "downloading",       label: "Downloading reel" },
      { key: "fetching_comments", label: "Fetching comments" },
      { key: "rendering",         label: "Rendering video" },
      { key: "posting",           label: "Posting to Instagram" },
      { key: "done",              label: "Done" },
    ];

    const STEPS_PREVIEW = [
      { key: "downloading",       label: "Downloading reel" },
      { key: "fetching_comments", label: "Fetching comments" },
      { key: "rendering",         label: "Rendering video" },
      { key: "done",              label: "Done" },
    ];

    const HINTS = {
      preview: "Renders the video so you can watch it — no posting.",
      upload:  "Renders the video and posts it to Instagram.",
    };

    let pollTimer = null;

    function setMode(m) {
      mode = m;
      document.getElementById("btn-preview").classList.toggle("active", m === "preview");
      document.getElementById("btn-upload").classList.toggle("active", m === "upload");
      document.getElementById("mode-hint").textContent = HINTS[m];
    }

    async function startJob() {
      const url = document.getElementById("url").value.trim();
      if (!url) return;

      document.getElementById("btn").disabled = true;
      document.getElementById("btn-preview").disabled = true;
      document.getElementById("btn-upload").disabled = true;
      document.getElementById("status-box").classList.add("visible");
      document.getElementById("result-area").style.display = "none";
      document.getElementById("result-area").innerHTML = "";
      document.getElementById("error-msg").style.display = "none";
      setStatus("queued");

      const res = await fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, post: mode === "upload" }),
      });

      if (!res.ok) {
        setStatus("error");
        showError("Failed to start job.");
        resetButtons();
        return;
      }

      const { job_id } = await res.json();
      document.getElementById("job-id").textContent = "Job: " + job_id;
      pollTimer = setInterval(() => pollStatus(job_id), 3000);
    }

    async function pollStatus(job_id) {
      const res = await fetch("/status/" + job_id);
      if (!res.ok) return;
      const data = await res.json();

      setStatus(data.status, data.post);

      if (data.status === "done") {
        clearInterval(pollTimer);
        resetButtons();
        showResult(data.result, data.post);
      } else if (data.status === "error") {
        clearInterval(pollTimer);
        resetButtons();
        showError(data.error || "Unknown error");
      }
    }

    function showResult(result, isUpload) {
      const area = document.getElementById("result-area");
      area.style.display = "block";
      if (isUpload) {
        area.innerHTML = `Posted: <a href="${result}" target="_blank">${result}</a>`;
      } else {
        area.innerHTML = `
          <div style="margin-bottom:8px;color:#aaa;">Preview ready:</div>
          <video class="preview-video" controls playsinline>
            <source src="${result}" type="video/mp4" />
          </video>`;
      }
    }

    function setStatus(status, isUpload) {
      const dot = document.getElementById("dot");
      const label = document.getElementById("status-label");

      label.textContent = status.replace(/_/g, " ");
      dot.className = "dot";

      if (status === "done") dot.classList.add("done");
      else if (status === "error") dot.classList.add("error");
      else dot.classList.add("in-progress");

      renderSteps(status, isUpload);
    }

    function renderSteps(currentStatus, isUpload) {
      const steps = (isUpload || mode === "upload") ? STEPS_UPLOAD : STEPS_PREVIEW;
      const container = document.getElementById("steps");
      const currentIdx = steps.findIndex(s => s.key === currentStatus);
      container.innerHTML = steps.map((step, i) => {
        let cls = "step";
        let icon = "○";
        if (i < currentIdx || currentStatus === "done") { cls += " done-step"; icon = "✓"; }
        else if (i === currentIdx) { cls += " active"; icon = "→"; }
        return `<div class="${cls}"><span class="step-icon">${icon}</span>${step.label}</div>`;
      }).join("");
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = "Error: " + msg;
      el.style.display = "block";
    }

    function resetButtons() {
      document.getElementById("btn").disabled = false;
      document.getElementById("btn-preview").disabled = false;
      document.getElementById("btn-upload").disabled = false;
    }
  </script>
</body>
</html>
